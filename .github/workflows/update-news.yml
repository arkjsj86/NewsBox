name: Update News Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-data-update
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
      deploy_sha: ${{ steps.commit.outputs.deploy_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update news JSON
        env:
          NEWSBOX_MAX_ITEMS_PER_FEED: 30
          NEWSBOX_ARTICLE_LIMIT_PER_TAB: 30
          NEWSBOX_LOOKBACK_HOURS: 336
          NEWSBOX_REQUEST_DELAY_MS: 300
          NEWSBOX_FEED_TIMEOUT_MS: 25000
          NEWSBOX_ESPORTS_MATCH_LIMIT: 12
          NEWSBOX_ESPORTS_ACTIVE_WINDOW_DAYS: 21
          NEWSBOX_ESPORTS_LIVE_GRACE_HOURS: 6
        run: node scripts/update-rss-news.mjs

      - name: Update LCK standings
        env:
          NEWSBOX_FEED_TIMEOUT_MS: 25000
        run: node scripts/update-esports-standings.mjs

      - name: Commit updated data
        id: commit
        run: |
          if git diff --quiet -- data; then
            echo "No data changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update news data"
          git push
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-pages:
    needs: update-news
    if: needs.update-news.outputs.has_changes == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout updated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-news.outputs.deploy_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: node scripts/build-pages.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
