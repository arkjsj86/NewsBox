name: Update News Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-data-update
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update news JSON
        env:
          NEWSBOX_MAX_ITEMS_PER_FEED: 18
          NEWSBOX_ARTICLE_LIMIT_PER_TAB: 8
          NEWSBOX_LOOKBACK_HOURS: 336
          NEWSBOX_REQUEST_DELAY_MS: 300
          NEWSBOX_FEED_TIMEOUT_MS: 15000
        run: node scripts/update-rss-news.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update news data"
          git push
